[build]
builder = "nixpacks"
buildCommand = "npx --yes pnpm@10 install && npx --yes pnpm@10 --filter @workspace/api-server run build"

[deploy]
startCommand = "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/tips"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
