services:
  - type: web
    name: arogyaai-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npx --yes pnpm@10 install --no-frozen-lockfile && npx --yes pnpm@10 --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
