kind = "web"
previewPath = "/"
title = "ArogyaAI - Health & Wellness"
version = "1.0.0"
id = "artifacts/arogyaai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22567

[services.development]
run = "pnpm --filter @workspace/arogyaai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arogyaai", "run", "build" ]
publicDir = "artifacts/arogyaai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22567"
BASE_PATH = "/"
